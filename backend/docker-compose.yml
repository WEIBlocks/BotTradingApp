services:
  postgres:
    image: postgres:16-alpine
    container_name: bottrade-postgres
    environment:
      POSTGRES_USER: bottrade
      POSTGRES_PASSWORD: bottrade_dev_2024
      POSTGRES_DB: bottrade
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bottrade-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
